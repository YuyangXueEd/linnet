# sources.yaml — enable/disable extensions and set source-level options.
#
# Each top-level key corresponds to an extension registered in extensions/__init__.py.
# To add a new extension:
#   1. Create extensions/my_source.py subclassing BaseExtension (key = "my_source")
#   2. Add it to REGISTRY in extensions/__init__.py
#   3. Add a config block here (and keyword filters in keywords.yaml if needed)

arxiv:
  enabled: true
  max_papers_per_run: 300

hacker_news:
  enabled: true

jobs:
  enabled: false   # extension offline — see extensions/jobs.py.bak

supervisor_monitoring:
  enabled: false   # extension offline — see extensions/supervisor.py.bak

github_trending:
  enabled: true
  max_repos: 15

# Output language for all summaries.
# Default: "en" (English, no translation needed).
# Set to "zh", "fr", "de", "ja", "ko", "es", "pt" for other languages.
# Any language code works — the LLM will respond in that language.
language: "en"

llm:
  scoring_model: "google/gemini-2.5-flash-lite-preview-09-2025"
  summarization_model: "google/gemini-2.5-flash-lite-preview-09-2025"
  base_url: "https://openrouter.ai/api/v1"

pages:
  base_url: ""

# ── Delivery sinks (all disabled by default) ──────────────────────────────
#
# Credentials are read from environment variables / GitHub secrets — never
# put API keys in this file.
#
# To add a new sink:
#   1. Create sinks/my_sink.py subclassing BaseSink (key = "my_sink")
#   2. Add it to SINK_REGISTRY in sinks/__init__.py
#   3. Add a config block here under sinks:
sinks:
  slack:
    enabled: true
    # Credential: SLACK_WEBHOOK_URL  (GitHub secret)
    # How to get: Slack workspace settings → Apps → Incoming Webhooks → Add New Webhook
    max_papers: 5   # top papers to post
    max_hn: 3       # top HN stories to post
    max_github: 3   # top GitHub repos to post

