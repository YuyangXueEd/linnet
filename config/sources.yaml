# sources.yaml — enable/disable extensions and global settings only.
#
# This file controls WHICH extensions run and global options (language, llm, sinks).
# All per-extension settings (limits, timeouts, keywords, etc.) live in
# config/extensions/<name>.yaml — edit those files to tune each extension.
#
# To add a new extension:
#   1. Create extensions/my_source/ subclassing BaseExtension (key = "my_source")
#   2. Add it to REGISTRY in extensions/__init__.py
#   3. Add "- my_source" to display_order below
#   4. Add an "enabled: true/false" block here
#   5. Create config/extensions/my_source.yaml for all other settings

display_order:
  - weather
  - arxiv
  - github_trending
  - hacker_news
  - postdoc_jobs
  - supervisor_updates

# Quote extensions — used as tagline replacement only, not shown as feed sections.
# Enable one at a time. quote_of_day requires API_NINJAS_KEY secret.
quote_of_day:
  enabled: false  # set to true + add API_NINJAS_KEY GitHub secret

hitokoto:
  enabled: false  # set to true for Chinese-language briefings (no key needed)

arxiv:
  enabled: true

hacker_news:
  enabled: true

postdoc_jobs:
  enabled: false   # extension offline — see extensions/postdoc_jobs/

supervisor_updates:
  enabled: false   # extension offline — see extensions/supervisor.py.bak

github_trending:
  enabled: true

weather:
  enabled: true

# Output language for all summaries.
# Default: "en" (English, no translation needed).
# Set to "zh", "fr", "de", "ja", "ko", "es", "pt" for other languages.
# Any language code works — the LLM will respond in that language.
language: "en"

llm:
  scoring_model: "google/gemini-2.5-flash-lite-preview-09-2025"
  summarization_model: "google/gemini-2.5-flash-lite-preview-09-2025"
  base_url: "https://openrouter.ai/api/v1"

  # ── Custom prompts (optional) ─────────────────────────────────────────────
  # Uncomment and edit any prompt below to override the built-in default.
  # Leave a prompt commented out to keep the default behaviour.
  #
  # Placeholders are filled at runtime — use exactly the names shown.
  # Do not add new placeholder names; unknown keys will cause a KeyError.
  #
  # prompts:
  #
  #   # arXiv relevance scoring (0-10). Placeholders: {title}, {abstract}
  #   arxiv_score: |
  #     Rate this arxiv paper's relevance to: Computer Vision, Medical Imaging
  #     (MRI/CT/ultrasound/pathology/fundus), LLMs, Vision-Language Models,
  #     Diffusion Models, Foundation Models.
  #
  #     Title: {title}
  #     Abstract: {abstract}
  #
  #     Reply with ONLY a single integer 0-10. No explanation.
  #
  #   # arXiv paper summary. Placeholders: {title}, {abstract}, {lang}
  #   arxiv_summary: |
  #     Summarize the core method and contribution of the following paper
  #     {lang}, in 2-3 sentences (≤100 words):
  #
  #     Title: {title}
  #     Abstract: {abstract}
  #
  #   # Hacker News story summary. Placeholders: {title}, {url}, {lang}
  #   hacker_news_summary: |
  #     Summarize the core content of the following tech news story
  #     {lang}, in one sentence (≤50 words):
  #
  #     Title: {title}
  #     URL: {url}
  #
  #   # GitHub trending repo summary. Placeholders: {full_name}, {description}, {lang}
  #   github_summary: |
  #     Summarize the core function and key features of the following GitHub
  #     repository {lang}, in one sentence (≤60 words):
  #
  #     Repo: {full_name}
  #     Description: {description}

pages:
  base_url: ""

# ── Delivery sinks (all disabled by default) ──────────────────────────────
#
# Credentials are read from environment variables / GitHub secrets — never
# put API keys in this file.
#
# To add a new sink:
#   1. Create sinks/my_sink.py subclassing BaseSink (key = "my_sink")
#   2. Add it to SINK_REGISTRY in sinks/__init__.py
#   3. Add a config block here under sinks:
sinks:
  slack:
    enabled: false
    # Credential: SLACK_WEBHOOK_URL  (GitHub secret)
    # How to get: Slack workspace settings → Apps → Incoming Webhooks → Add New Webhook
    max_papers: 5   # top papers to post
    max_hn: 3       # top HN stories to post
    max_github: 3   # top GitHub repos to post
  serverchan:
    enabled: false
    # Credential: SERVERCHAN_SENDKEY  (GitHub secret)
    # Docs: https://sct.ftqq.com/sendkey
    # Optional referral link: https://sct.ftqq.com/r/21449
    max_papers: 5
    max_hn: 3
    max_github: 3
    max_jobs: 3
