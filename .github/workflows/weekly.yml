name: Weekly Digest

on:
  schedule:
    - cron: '0 0 * * 1'   # Monday UTC midnight
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly rollup
        run: python main.py --mode weekly
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push weekly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/weekly/ docs/weekly/
          git diff --staged --quiet || git commit -m "weekly: $(date -u +%Y-W%V)"
          git pull --rebase -X ours origin main
          git push
