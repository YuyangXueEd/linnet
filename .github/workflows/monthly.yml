name: Monthly Digest

on:
  schedule:
    - cron: '0 0 1 * *'   # 1st of month UTC midnight
  workflow_dispatch:

jobs:
  monthly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly rollup
        run: python main.py --mode monthly
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push monthly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/monthly/ docs/monthly/
          git diff --staged --quiet || git commit -m "monthly: $(date -u +%Y-%m)"
          git pull --rebase -X ours origin main
          git push
